<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ASTROPHILE — Order & Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
button{outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;border:none;}
:root{
  --cyan:#00f5ff;--purple:#7700ff;--magenta:#ff00d4;--green:#00ff88;
  --red:#ff4d6d;--yellow:#ffcc00;--orange:#ffaa44;
  --bg:#020509;--card:rgba(6,10,22,0.95);
  --t40:rgba(168,200,240,0.40);--t25:rgba(168,200,240,0.25);--t12:rgba(168,200,240,0.12);
}
body{
  background:var(--bg);color:#e8f4ff;
  font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 70% 40% at 15% 0%,rgba(0,245,255,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 100%,rgba(119,0,255,0.08) 0%,transparent 60%);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes rgbBar{from{background-position:0}to{background-position:220% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

.rgb-bar{height:3px;background:linear-gradient(90deg,transparent,var(--cyan),var(--magenta),var(--green),var(--purple),var(--cyan),transparent);background-size:220% 100%;animation:rgbBar 5s linear infinite;}
.loader{display:inline-block;width:20px;height:20px;border:2px solid rgba(0,245,255,0.20);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;}

/* ── LOADING / ERROR SCREEN ── */
#loadScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;}
.load-logo{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.load-sub{font-size:10px;letter-spacing:4px;color:rgba(168,200,240,0.35);margin-bottom:28px;}

/* ── SETUP SCREEN ── */
#setupScreen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:24px;animation:fadeUp 0.4s ease;}
.setup-card{width:100%;max-width:380px;text-align:center;}
.setup-logo{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.setup-sub{font-size:10px;letter-spacing:4px;color:rgba(168,200,240,0.35);margin-bottom:28px;}
.setup-box{background:linear-gradient(145deg,rgba(7,15,28,0.98),rgba(13,26,46,0.95));border:1px solid rgba(0,245,255,0.15);border-radius:20px;padding:26px 20px;box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 40px rgba(0,245,255,0.04);}
.setup-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1.5px;color:rgba(90,128,168,1);margin-bottom:6px;display:block;text-align:left;}
.setup-input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid rgba(0,245,255,0.20);background:rgba(0,245,255,0.04);color:#fff;font-size:14px;font-family:'Rajdhani',sans-serif;font-weight:600;outline:none;margin-bottom:14px;transition:border-color .2s;}
.setup-input:focus{border-color:rgba(0,245,255,0.50);}
.setup-input::placeholder{color:rgba(168,200,240,0.30);}
.setup-select{width:100%;padding:13px 16px;border-radius:12px;border:1px solid rgba(0,245,255,0.20);background:rgba(6,10,22,0.95);color:#fff;font-size:14px;font-family:'Rajdhani',sans-serif;font-weight:600;outline:none;margin-bottom:16px;appearance:none;cursor:pointer;}
.setup-btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,rgba(0,245,255,0.16),rgba(119,0,255,0.12));border:1px solid rgba(0,245,255,0.35);color:var(--cyan);font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;transition:all .2s;}
.setup-btn:active{transform:scale(0.98);}
.setup-btn:disabled{opacity:0.4;cursor:not-allowed;}
.setup-err{font-size:11px;color:var(--red);margin-top:8px;min-height:16px;text-align:left;}

/* ── MAIN APP ── */
#appShell{display:none;min-height:100vh;animation:fadeUp 0.3s ease;}
.app-header{background:rgba(2,5,9,0.96);border-bottom:1px solid rgba(0,245,255,0.10);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header-logo{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:1.5px;}
.header-sub{font-size:10px;color:var(--t40);}
.header-tv{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;background:rgba(0,245,255,0.10);border:1px solid rgba(0,245,255,0.25);color:var(--cyan);padding:4px 10px;border-radius:20px;}
.change-btn{font-size:10px;color:rgba(168,200,240,0.45);background:none;border:1px solid rgba(168,200,240,0.15);padding:4px 10px;border-radius:20px;font-family:'Rajdhani',sans-serif;transition:all .2s;}

/* Tab Nav */
.tab-nav{display:flex;background:rgba(2,5,9,0.95);border-bottom:1px solid rgba(0,245,255,0.08);position:sticky;top:53px;z-index:99;}
.tab-btn{flex:1;padding:13px 8px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;color:rgba(168,200,240,0.40);background:none;border-bottom:2px solid transparent;transition:all .2s;position:relative;}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.tab-badge{position:absolute;top:7px;right:calc(50% - 24px);background:var(--red);color:#fff;font-size:8px;font-family:'Orbitron',monospace;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;animation:bounce 1.2s infinite;}

/* Tab Content */
.tab-content{display:none;padding:16px;padding-bottom:100px;}
.tab-content.active{display:block;animation:fadeUp 0.25s ease;}
.sec-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:rgba(0,245,255,0.55);margin-bottom:12px;}

/* Menu */
.menu-category{margin-bottom:24px;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.menu-card{background:rgba(6,10,22,0.95);border:1px solid rgba(0,245,255,0.10);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;animation:fadeUp 0.3s ease;}
.menu-card:active{transform:scale(0.97);}
.menu-card.habis{opacity:0.45;cursor:not-allowed;}
.menu-img{width:100%;height:100px;background:rgba(0,245,255,0.04);display:flex;align-items:center;justify-content:center;font-size:38px;}
.menu-img img{width:100%;height:100%;object-fit:cover;}
.menu-info{padding:10px 10px 12px;}
.menu-nama{font-size:13px;font-weight:700;color:#e8f4ff;margin-bottom:3px;line-height:1.3;}
.menu-harga{font-family:'Orbitron',monospace;font-size:11px;color:var(--green);font-weight:700;}
.menu-stok-habis{font-size:9px;letter-spacing:1px;color:var(--red);font-family:'Orbitron',monospace;margin-top:3px;}

/* Empty */
.empty-state{text-align:center;padding:36px 20px;color:var(--t40);}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-text{font-size:12px;line-height:1.6;}

/* Keranjang bar */
.keranjang-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:rgba(2,5,9,0.97);border-top:1px solid rgba(0,245,255,0.15);display:none;animation:slideUp 0.3s ease;}
.keranjang-btn{width:100%;padding:15px;border-radius:14px;background:linear-gradient(135deg,rgba(0,245,255,0.18),rgba(119,0,255,0.14));border:1px solid rgba(0,245,255,0.40);color:var(--cyan);font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1.5px;display:flex;align-items:center;justify-content:space-between;transition:all .2s;}
.keranjang-btn:active{transform:scale(0.98);}
.k-count{background:var(--cyan);color:#020509;font-size:10px;padding:3px 8px;border-radius:20px;font-weight:900;}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{width:100%;max-width:480px;background:linear-gradient(145deg,rgba(7,15,28,0.99),rgba(13,26,46,0.97));border:1px solid rgba(0,245,255,0.15);border-radius:24px 24px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;animation:slideUp 0.3s ease;}
.modal-handle{width:40px;height:4px;background:rgba(168,200,240,0.20);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--cyan);letter-spacing:1.5px;margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--t40);margin-bottom:16px;}

/* Item modal */
.item-img-modal{width:100%;height:150px;background:rgba(0,245,255,0.04);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:56px;margin-bottom:14px;overflow:hidden;border:1px solid rgba(0,245,255,0.10);}
.item-img-modal img{width:100%;height:100%;object-fit:cover;}
.qty-row{display:flex;align-items:center;justify-content:center;gap:20px;margin:14px 0;}
.qty-btn{width:40px;height:40px;border-radius:50%;background:rgba(0,245,255,0.10);border:1px solid rgba(0,245,255,0.25);color:var(--cyan);font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.qty-btn:active{transform:scale(0.88);}
.qty-num{font-family:'Orbitron',monospace;font-size:24px;font-weight:700;color:#fff;min-width:40px;text-align:center;}
.add-btn{width:100%;padding:15px;border-radius:14px;background:linear-gradient(135deg,rgba(0,255,136,0.18),rgba(0,245,255,0.10));border:1px solid rgba(0,255,136,0.35);color:var(--green);font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1.5px;transition:all .2s;margin-top:4px;}
.add-btn:active{transform:scale(0.98);}
.cancel-btn{width:100%;padding:12px;margin-top:8px;background:none;border:1px solid rgba(168,200,240,0.12);color:var(--t40);border-radius:12px;font-family:'Rajdhani',sans-serif;font-size:12px;}
.note-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1.5px;color:rgba(0,245,255,0.55);margin-bottom:6px;display:block;}
.note-input{width:100%;padding:11px 14px;border-radius:12px;border:1px solid rgba(0,245,255,0.20);background:rgba(0,245,255,0.04);color:#fff;font-size:13px;font-family:'Rajdhani',sans-serif;outline:none;resize:none;line-height:1.4;min-height:60px;max-height:100px;}
.note-input:focus{border-color:rgba(0,245,255,0.45);}
.note-input::placeholder{color:rgba(168,200,240,0.30);}

/* Cart items */
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(0,245,255,0.07);}
.cart-item-info{flex:1;}
.cart-item-nama{font-size:13px;font-weight:700;color:#e8f4ff;}
.cart-item-harga{font-size:11px;color:var(--green);font-family:'Orbitron',monospace;}
.cart-qty{display:flex;align-items:center;gap:8px;}
.cq-btn{width:28px;height:28px;border-radius:50%;background:rgba(0,245,255,0.08);border:1px solid rgba(0,245,255,0.20);color:var(--cyan);font-size:14px;display:flex;align-items:center;justify-content:center;}
.cq-num{font-family:'Orbitron',monospace;font-size:12px;color:#fff;min-width:20px;text-align:center;}
.cart-total{margin-top:16px;padding-top:14px;border-top:1px solid rgba(0,245,255,0.12);display:flex;justify-content:space-between;align-items:center;}
.cart-total-label{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;color:var(--t40);}
.cart-total-val{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--green);}
.order-btn{width:100%;padding:15px;border-radius:14px;margin-top:14px;background:linear-gradient(135deg,rgba(0,255,136,0.20),rgba(0,245,255,0.12));border:1px solid rgba(0,255,136,0.40);color:var(--green);font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1.5px;transition:all .2s;}
.order-btn:active{transform:scale(0.98);}
.order-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* Pesanan */
.order-card{background:rgba(6,10,22,0.95);border:1px solid rgba(0,245,255,0.10);border-radius:14px;padding:14px;margin-bottom:10px;animation:fadeUp 0.3s ease;}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.order-time{font-size:10px;color:var(--t40);}
.order-status{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;padding:3px 10px;border-radius:20px;}
.s-pending{background:rgba(255,204,0,0.10);border:1px solid rgba(255,204,0,0.25);color:var(--yellow);}
.s-diproses{background:rgba(0,245,255,0.10);border:1px solid rgba(0,245,255,0.25);color:var(--cyan);}
.s-selesai{background:rgba(0,255,136,0.10);border:1px solid rgba(0,255,136,0.25);color:var(--green);}
.s-batal{background:rgba(255,77,109,0.10);border:1px solid rgba(255,77,109,0.25);color:var(--red);}
.order-items{font-size:12px;color:rgba(232,244,255,0.90);line-height:1.8;}
.order-total-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,245,255,0.08);}

/* Chat */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 108px);padding-bottom:0;overflow:hidden;}
.chat-messages{flex:1;overflow-y:auto;padding:4px 0 12px;display:flex;flex-direction:column;gap:10px;min-height:0;}
.chat-bubble{max-width:76%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;animation:fadeUp 0.2s ease;}
.bubble-me{align-self:flex-end;background:linear-gradient(135deg,rgba(0,245,255,0.18),rgba(119,0,255,0.12));border:1px solid rgba(0,245,255,0.25);color:#e8f4ff;border-bottom-right-radius:4px;}
.bubble-op{align-self:flex-start;background:rgba(13,26,46,0.95);border:1px solid rgba(168,200,240,0.18);color:#e8f4ff;border-bottom-left-radius:4px;}
.bubble-time{font-size:9px;color:rgba(168,200,240,0.65);margin-top:4px;text-align:right;}
.bubble-sender{font-size:10px;color:var(--cyan);margin-bottom:4px;font-family:'Orbitron',monospace;letter-spacing:0.5px;}
.chat-bottom{padding:8px 16px calc(12px + env(safe-area-inset-bottom));border-top:1px solid rgba(0,245,255,0.10);background:rgba(2,5,9,0.97);}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;padding-top:8px;}
.chat-input{flex:1;padding:12px 14px;border-radius:12px;min-height:44px;max-height:100px;border:1px solid rgba(0,245,255,0.20);background:rgba(0,245,255,0.04);color:#fff;font-size:13px;font-family:'Rajdhani',sans-serif;outline:none;resize:none;line-height:1.4;}
.chat-input:focus{border-color:rgba(0,245,255,0.45);}
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0 8px;}
.quick-replies::-webkit-scrollbar{display:none;}
.qr-btn{flex-shrink:0;padding:6px 12px;height:32px;border-radius:20px;background:rgba(0,245,255,0.07);border:1px solid rgba(0,245,255,0.22);color:rgba(232,244,255,0.85);font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:600;white-space:nowrap;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.qr-btn:active{background:rgba(0,245,255,0.18);transform:scale(0.96);}
.chat-send{width:44px;height:44px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,rgba(0,245,255,0.18),rgba(119,0,255,0.14));border:1px solid rgba(0,245,255,0.35);color:var(--cyan);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.chat-send:active{transform:scale(0.93);}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t40);text-align:center;gap:8px;}

/* Sukses */
.success-card{text-align:center;padding:20px;}
.success-icon{font-size:52px;margin-bottom:12px;}
.success-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--green);letter-spacing:2px;margin-bottom:6px;}
.success-sub{font-size:12px;color:var(--t40);line-height:1.6;margin-bottom:16px;}
.nota{background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.15);border-radius:12px;padding:14px;text-align:left;margin-bottom:16px;}
.nota-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;}
.nota-row span:last-child{color:var(--green);font-weight:700;}
.to-pesanan-btn{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,rgba(0,255,136,0.15),rgba(0,245,255,0.08));border:1px solid rgba(0,255,136,0.30);color:var(--green);font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;}

/* Toast */
#toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:9999;background:rgba(10,14,26,0.96);color:#e8f4ff;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;padding:10px 20px;border-radius:40px;border:1px solid rgba(0,245,255,0.25);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .22s;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(0,245,255,0.20);border-radius:2px;}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOADING -->
<div id="loadScreen">
  <div>
    <div class="load-logo">ASTROPHILE</div>
    <div class="load-sub">ORDER & CHAT</div>
    <div class="loader" style="margin:0 auto;"></div>
  </div>
</div>

<!-- SETUP: Pilih TV & Nama -->
<div id="setupScreen" style="display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;">
  <div class="setup-card">
    <div class="setup-logo" id="setupLogo">ASTROPHILE</div>
    <div class="setup-sub" id="setupSub">PLAYSTATION BILLING</div>
    <div class="setup-box">
      <div style="font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:var(--cyan);margin-bottom:6px;">🎮 SELAMAT DATANG</div>
      <div style="font-size:12px;color:var(--t40);margin-bottom:20px;line-height:1.5;">Masukkan nama dan pilih TV kamu untuk mulai pesan atau chat ke operator.</div>
      <label class="setup-label">NAMA KAMU</label>
      <input class="setup-input" id="inputNama" type="text" placeholder="Nama kamu..." maxlength="30" autocomplete="off">
      <label class="setup-label">NOMOR TV</label>
      <select class="setup-select" id="selectTV">
        <option value="">— Pilih Nomor TV —</option>
      </select>
      <button class="setup-btn" id="btnMasuk" onclick="doMasuk()">MASUK →</button>
      <div class="setup-err" id="setupErr"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appShell" style="display:none;">
  <div class="app-header">
    <div>
      <div class="header-logo" id="hLogo">ASTROPHILE</div>
      <div class="header-sub" id="hNama"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="header-tv" id="hTV">TV ?</div>
      <button class="change-btn" onclick="gantiTV()">Ganti</button>
    </div>
  </div>
  <div class="rgb-bar"></div>
  <div class="tab-nav">
    <button class="tab-btn active" id="tbMenu" onclick="switchTab('menu')">🍔 MENU</button>
    <button class="tab-btn" id="tbPesanan" onclick="switchTab('pesanan')">
      📋 PESANAN
      <span class="tab-badge" id="bdPesanan"></span>
    </button>
    <button class="tab-btn" id="tbChat" onclick="switchTab('chat')">
      💬 CHAT
      <span class="tab-badge" id="bdChat"></span>
    </button>
  </div>

  <!-- TAB MENU -->
  <div class="tab-content active" id="tabMenu">

  <!-- TAB PESANAN -->
  <div class="tab-content" id="tabPesanan">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0 0 8px;">

    <div id="pesananList">

  <!-- TAB CHAT -->
  <div class="tab-content" id="tabChat" style="padding:16px 16px 0;">

<div class="modal-overlay" id="mItem">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="item-img-modal" id="mItemImg">🍽️</div>
    <div class="modal-title" id="mItemNama"></div>
    <div style="font-family:'Orbitron',monospace;font-size:14px;color:var(--green);font-weight:700;margin-bottom:4px;" id="mItemHarga"></div>
    <div style="font-size:11px;color:var(--t40);" id="mItemStok"></div>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <div class="qty-num" id="mQty">1</div>
      <button class="qty-btn" onclick="changeQty(1)">+</button>

<!-- MODAL KERANJANG -->
<div class="modal-overlay" id="mKeranjang">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">🛒 KERANJANG</div>
    <div class="modal-sub" id="kSubtitle"></div>
    <div id="kItems"></div>

      <div class="cart-total-label">TOTAL</div>
      <div class="cart-total-val" id="kTotal">Rp 0</div>

    <button class="order-btn" id="btnOrder" onclick="submitOrder()">✓ KIRIM PESANAN</button>
    <button class="cancel-btn" onclick="closeModal('mKeranjang')">Lanjut Belanja</button>

  <div class="modal-box">
    <div class="modal-handle"></div>
    <div id="suksesContent"></div>
  </div>

<script>
// ══════════════════════════════════════
// MASTER CONFIG (sama seperti index.html)
// ══════════════════════════════════════
const _MASTER_CFG = {
  apiKey:      "AIzaSyD8XffAZK8JUOBajCUVyPS-NT9jnwYBats",
  authDomain:  "astrophile-rental.firebaseapp.com",
  databaseURL: "https://astrophile-rental-default-rtdb.firebaseio.com",
  projectId:   "astrophile-rental"
}

let db = null
let currentTV   = null
let currentNama = ''
let cart        = []
let curItem     = null
let curQty      = 1
let myOrderIds  = JSON.parse(localStorage.getItem('_cust_oids') || '[]')

// ── Decrypt config (sama seperti index.html) ──
function _decryptCfg(enc){
  try{
    let b64 = enc.replace(/-/g,'+').replace(/_/g,'/')
    while(b64.length % 4) b64 += '='
    const bin = atob(b64)
    const S   = "ADM_2K26"
    let dec   = ""
    for(let i=0;i<bin.length;i++) dec += String.fromCharCode(bin.charCodeAt(i) ^ S.charCodeAt(i%S.length))
    return JSON.parse(dec)
  }catch(e){ return null }
}

// ── Init DB ──
function _initDB(cfg){
  try{
    const name = 'cust_' + (cfg.projectId || Date.now())
    let app
    try{ app = firebase.app(name) }catch(e){ app = firebase.initializeApp(cfg, name) }
    db = firebase.database(app)
    window._custDb = db
    onDbReady()
  }catch(e){
    alert('_initDB ERROR: ' + e.message)
    showError('❌ Koneksi Firebase gagal: ' + e.message)
  }
}

// ── Ambil client ID dari URL ──
const _clientId = new URLSearchParams(location.search).get('db')

// ── Boot ──
;(function(){
  if(!_clientId){
    showError('🔗 Link tidak valid.\nHalaman ini hanya bisa diakses melalui link yang diberikan oleh rental PS.')
    return
  }
  // Ambil config dari master Firebase (sama seperti index.html)
  try{ firebase.initializeApp(_MASTER_CFG, 'master') }catch(e){}
  const mApp = firebase.apps.find(a => a.name === 'master') || firebase.apps[0]
  firebase.database(mApp).ref('clients/' + _clientId).once('value', snap => {
    const d = snap.val()
    if(!d || d.aktif === false){
      showError('🔗 Link tidak valid atau tidak aktif.')
      return
    }
    const cfg = d.config ? _decryptCfg(d.config) : d
    if(cfg && cfg.apiKey){
      _initDB(cfg)
    } else {
      showError('❌ Konfigurasi tidak ditemukan.')
    }
  }, err => {
    showError('❌ Gagal terhubung ke server.')
  })
})()

// ── Setelah DB siap ──
function onDbReady(){
  // Load branding dari Firebase
  db.ref('settings').once('value', snap => {
    const s = snap.val() || {}
    const nama     = s.bookingSiteNama     || s.titleTop || 'ASTROPHILE'
    const subtitle = s.bookingSiteSubtitle || 'PLAYSTATION BILLING'
    document.getElementById('setupLogo').textContent = nama
    document.getElementById('setupSub').textContent  = subtitle
    document.getElementById('hLogo').textContent     = nama
    document.title = nama + ' — Order & Chat'

    // Load total TV untuk dropdown
    const total = s.totalTV || 5
    const sel = document.getElementById('selectTV')
    sel.innerHTML = '<option value="">— Pilih Nomor TV —</option>'
    for(let i=1; i<=total; i++){
      sel.innerHTML += `<option value="${i}">TV ${i}</option>`
    }
  })

  // Restore sesi sebelumnya
  const savedNama = localStorage.getItem('_cust_nama_' + _clientId)
  const savedTV   = localStorage.getItem('_cust_tv_'   + _clientId)
  if(savedNama) document.getElementById('inputNama').value = savedNama
  if(savedTV)   document.getElementById('selectTV').value  = savedTV

  document.getElementById('loadScreen').style.display  = 'none'

  // Auto-login jika ada sesi tersimpan
  if(savedNama && savedTV){
    currentNama = savedNama
    currentTV   = parseInt(savedTV)
    startApp()
  } else {
    document.getElementById('setupScreen').style.display = 'flex'
  }
}

// ══════════════════════════════════════
// SETUP — Masuk
// ══════════════════════════════════════
function doMasuk(){
  const nama = document.getElementById('inputNama').value.trim()
  const tv   = document.getElementById('selectTV').value
  const err  = document.getElementById('setupErr')
  if(!nama){ err.textContent = '⚠️ Masukkan nama kamu dulu.'; return }
  if(!tv)  { err.textContent = '⚠️ Pilih nomor TV kamu.'; return }
  err.textContent = ''
  currentNama = nama
  currentTV   = parseInt(tv)
  localStorage.setItem('_cust_nama_' + _clientId, nama)
  localStorage.setItem('_cust_tv_'   + _clientId, tv)
  startApp()
}

function gantiTV(){
  document.getElementById('appShell').style.display    = 'none'
  document.getElementById('setupScreen').style.display = 'flex'
  document.getElementById('inputNama').value = currentNama
}

function startApp(){
  document.getElementById('setupScreen').style.display = 'none'
  document.getElementById('appShell').style.display    = 'block'
  document.getElementById('hTV').textContent   = 'TV ' + currentTV
  document.getElementById('hNama').textContent = currentNama
  document.getElementById('kSubtitle').textContent = `TV ${currentTV} · ${currentNama}`
  loadMenu()
  listenOrders()
  listenChat()
}

// ══════════════════════════════════════
// MENU
// ══════════════════════════════════════
function loadMenu(){
  document.getElementById('menuLoading').style.display = 'block'
  document.getElementById('menuContent').style.display = 'none'
  let makanan = [], minuman = []

  const updateMenu = () => {
    document.getElementById('menuLoading').style.display = 'none'
    document.getElementById('menuContent').style.display = 'block'
    renderMenu(makanan, minuman)
  }

  db.ref('kantin/makanan').on('value', snap => {
    const _mRaw = snap.val()
    makanan = _mRaw ? (typeof _mRaw === 'string' ? JSON.parse(_mRaw) : (Array.isArray(_mRaw) ? _mRaw : Object.values(_mRaw))) : (JSON.parse(localStorage.getItem('ps_makanan')||'[]'))
    updateMenu()
  })
  db.ref('kantin/minuman').on('value', snap => {
    const _miRaw = snap.val()
    minuman = _miRaw ? (typeof _miRaw === 'string' ? JSON.parse(_miRaw) : (Array.isArray(_miRaw) ? _miRaw : Object.values(_miRaw))) : (JSON.parse(localStorage.getItem('ps_minuman')||'[]'))
    updateMenu()
  })
}

function renderMenu(makanan, minuman){
  const el = document.getElementById('menuContent')
  let html = ''
  if(makanan.length){
    html += `<div class="menu-category"><div class="sec-label">🍔 MAKANAN</div><div class="menu-grid">`
    makanan.forEach(item => html += menuCard(item,'makanan'))
    html += `</div></div>`
  }
  if(minuman.length){
    html += `<div class="menu-category"><div class="sec-label">🥤 MINUMAN</div><div class="menu-grid">`
    minuman.forEach(item => html += menuCard(item,'minuman'))
    html += `</div></div>`
  }
  if(!makanan.length && !minuman.length){
    html = `<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-text">Menu belum tersedia.<br>Silakan tanya ke operator.</div></div>`
  }
  el.innerHTML = html
}

function menuCard(item, jenis){
  const habis = item.stock !== '' && item.stock !== undefined && item.stock !== null && Number(item.stock) <= 0
  const emoji = jenis === 'makanan' ? '🍔' : '🥤'
  const imgHtml = item.gambar ? `<img src="${item.gambar}" alt="${escH(item.nama)}" loading="lazy">` : emoji
  const safeId = escH(item.id || item.nama || '')
  if(!window._menuRef) window._menuRef = {}
  window._menuRef[safeId] = item
  const onclick = habis ? '' : `onclick="openItem('${safeId}','${jenis}')"`
  const stokTxt = (item.stock !== '' && item.stock !== undefined && item.stock !== null)
    ? (habis ? '<div class="menu-stok-habis">HABIS</div>' : `<div style="font-size:9px;color:rgba(168,200,240,0.50);margin-top:2px;">Stok: ${item.stock}</div>`)
    : ''
  return `<div class="menu-card${habis?' habis':''}" ${onclick}>
    <div class="menu-img">${imgHtml}</div>
    <div class="menu-info">
      <div class="menu-nama">${escH(item.nama)}</div>
      <div class="menu-harga">${rp(item.harga)}</div>
      ${stokTxt}
    </div>
  </div>`
}

// ══════════════════════════════════════
// ITEM MODAL
// ══════════════════════════════════════
function openItem(jsonStr, jenis){
  curItem = { ...(window._menuRef && window._menuRef[jsonStr] ? window._menuRef[jsonStr] : {}), jenis }
  curQty  = 1
  const emoji = jenis === 'makanan' ? '🍔' : '🥤'
  const imgEl = document.getElementById('mItemImg')
  imgEl.innerHTML = curItem.gambar ? `<img src="${curItem.gambar}" alt="${escH(curItem.nama)}">` : emoji
  document.getElementById('mItemNama').textContent  = curItem.nama
  document.getElementById('mItemHarga').textContent = rp(curItem.harga)
  const stok = curItem.stock
  document.getElementById('mItemStok').textContent = (stok !== '' && stok !== undefined && stok !== null) ? `Stok: ${stok}` : ''
  updateModalQty()
  document.getElementById('mItemNote').value = ''
  openModal('mItem')
}

function changeQty(d){
  const max = (curItem.stock !== '' && curItem.stock !== undefined && curItem.stock !== null) ? Number(curItem.stock) : 99
  curQty = Math.max(1, Math.min(max, curQty + d))
  updateModalQty()
}

function updateModalQty(){
  document.getElementById('mQty').textContent      = curQty
  document.getElementById('mSubtotal').textContent = 'Subtotal: ' + rp(curItem.harga * curQty)
}

function addToCart(){
  const note = document.getElementById('mItemNote').value.trim()
  const ex = cart.find(c => c.id === curItem.id && c.note === note)
  if(ex) ex.qty += curQty
  else   cart.push({ ...curItem, qty: curQty, note })
  closeModal('mItem')
  updateKBar()
  showToast('✅ ' + curItem.nama + ' ditambahkan!')
}

function updateKBar(){
  const total = cart.reduce((s,c) => s + c.qty, 0)
  document.getElementById('kCount').textContent = total
  document.getElementById('kBar').style.display = total > 0 ? 'block' : 'none'
}

// ══════════════════════════════════════
// KERANJANG
// ══════════════════════════════════════
function openKeranjang(){
  renderKeranjang()
  openModal('mKeranjang')
}

function renderKeranjang(){
  const el = document.getElementById('kItems')
  if(!cart.length){
    el.innerHTML = '<div class="empty-state" style="padding:20px 0;"><div class="empty-icon">🛒</div><div class="empty-text">Keranjang kosong.</div></div>'
    document.getElementById('kTotal').textContent = 'Rp 0'
    return
  }
  let html = '', total = 0
  cart.forEach((item,i) => {
    const sub = item.harga * item.qty; total += sub
    html += `<div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-nama">${escH(item.nama)}</div>
        <div class="cart-item-harga">${rp(sub)}</div>
        ${item.note ? `<div style="font-size:10px;color:rgba(168,200,240,0.50);margin-top:2px;">📝 ${escH(item.note)}</div>` : ''}
      </div>
      <div class="cart-qty">
        <button class="cq-btn" onclick="cartQty(${i},-1)">−</button>
        <div class="cq-num">${item.qty}</div>
        <button class="cq-btn" onclick="cartQty(${i},1)">+</button>
      </div>
    </div>`
  })
  el.innerHTML = html
  document.getElementById('kTotal').textContent = rp(total)
}

function cartQty(i, d){
  cart[i].qty += d
  if(cart[i].qty <= 0) cart.splice(i, 1)
  updateKBar(); renderKeranjang()
}

// ══════════════════════════════════════
// SUBMIT ORDER
// ══════════════════════════════════════
async function submitOrder(){
  if(!cart.length){ showToast('⚠️ Keranjang kosong!'); return }
  const btn = document.getElementById('btnOrder')
  btn.disabled = true; btn.textContent = '⏳ MENGIRIM...'
  const total = cart.reduce((s,c) => s + c.harga * c.qty, 0)
  const order = {
    tv: currentTV, nama: currentNama,
    items: cart.map(c => ({ id:c.id, nama:c.nama, harga:c.harga, qty:c.qty, jenis:c.jenis, note:c.note||'' })),
    total, status: 'pending', createdAt: Date.now()
  }
  try{
    const ref = await db.ref(`orders/tv${currentTV}`).push(order)
    myOrderIds.push(ref.key)
    localStorage.setItem('_cust_oids', JSON.stringify(myOrderIds))
    // Notif ke operator
    await db.ref(`notifications/orders/${ref.key}`).set({ tv:currentTV, nama:currentNama, total, orderId:ref.key, createdAt:Date.now(), read:false })
    cart = []; updateKBar()
    closeModal('mKeranjang')
    showSukses(order)
  }catch(e){
    showToast('❌ Gagal kirim. Coba lagi.')
  }
  btn.disabled = false; btn.textContent = '✓ KIRIM PESANAN'
}

function showSukses(order){
  const items = order.items.map(i => `<div class="nota-row"><span>${escH(i.nama)} x${i.qty}${i.note ? ` <span style="font-size:9px;color:rgba(168,200,240,0.50);">(${escH(i.note)})</span>` : ''}</span><span>${rp(i.harga*i.qty)}</span></div>`).join('')
  document.getElementById('suksesContent').innerHTML = `
    <div class="success-card">
      <div class="success-icon">✅</div>
      <div class="success-title">PESANAN DIKIRIM!</div>
      <div class="success-sub">Pesanan kamu sudah diterima operator.<br>Tunggu sebentar ya!</div>
      <div class="nota">
        <div style="font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;color:var(--t40);margin-bottom:8px;">DETAIL · TV ${order.tv}</div>
        ${items}
        <div class="nota-row" style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,245,255,0.10);">
          <span style="font-family:'Orbitron',monospace;font-size:10px;">TOTAL</span>
          <span>${rp(order.total)}</span>
        </div>
      </div>
      <button class="to-pesanan-btn" onclick="closeModal('mSukses');switchTab('pesanan')">LIHAT PESANAN</button>
    </div>`
  openModal('mSukses')
}

// ══════════════════════════════════════
// LISTEN ORDERS
// ══════════════════════════════════════
function listenOrders(){
  db.ref(`orders/tv${currentTV}`).on('value', snap => {
    renderPesanan(snap.val() || {})
  }, err => {
    // Reconnect setiap 5 detik jika error
    setTimeout(listenOrders, 5000)
  })
}

function renderPesanan(all){
  const el = document.getElementById('pesananList')
  const mine = Object.entries(all)
    .filter(([id, o]) => o && o.nama === currentNama)
    .sort((a,b) => (b[1].createdAt||0) - (a[1].createdAt||0))
  if(!mine.length){
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Belum ada pesanan.<br>Pesan dari tab Menu.</div></div>'
    return
  }
  const statusCfg = {
    pending:  { cls:'s-pending',  label:'⏳ MENUNGGU' },
    diproses: { cls:'s-diproses', label:'🔄 DIPROSES' },
    selesai:  { cls:'s-selesai',  label:'✅ SELESAI'  },
    batal:    { cls:'s-batal',    label:'❌ BATAL'    }
  }

  // Badge pesanan selesai baru
  let newSelesai = 0
  el.innerHTML = mine.map(([id, o]) => {
    const cfg = statusCfg[o.status] || statusCfg.pending
    if(o.status === 'selesai') newSelesai++
    const waktu = o.createdAt ? new Date(o.createdAt).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) : ''
    const itemsTxt = (o.items||[]).map(i => `${escH(i.nama)} x${i.qty}${i.note ? ` <span style="color:rgba(168,200,240,0.45);font-size:10px;">(${escH(i.note)})</span>` : ''}`).join(', ')
    return `<div class="order-card">
      <div class="order-header">
        <div class="order-time">${waktu}</div>
        <div class="order-status ${cfg.cls}">${cfg.label}</div>
      </div>
      <div class="order-items">${itemsTxt}</div>
      <div class="order-total-row">
        <div style="font-size:11px;color:var(--t40);">TOTAL</div>
        <div style="font-family:'Orbitron',monospace;font-size:12px;color:var(--green);font-weight:700;">${rp(o.total||0)}</div>
      </div>
    </div>`
  }).join('')
}

// ══════════════════════════════════════
// CHAT
// ══════════════════════════════════════
// Auto-refresh pesanan setiap 5 detik
setInterval(() => {
  if(currentTV && db){
    db.ref(`orders/tv${currentTV}`).once('value', snap => {
      renderPesanan(snap.val() || {})
    })
  }
}, 5000)

// Auto-refresh halaman setiap 60 detik tanpa reset sesi
setInterval(() => {
  if(currentTV && db){
    loadMenu()
  }
}, 60000)

function listenChat(){
  db.ref(`chats/tv${currentTV}`).on('value', snap => {
    renderChat(snap.val() || {})
    // Mark operator messages as readByCustomer
    const updates = {}
    snap.forEach(child => {
      if(child.val().dari === 'operator' && !child.val().readByCustomer){
        updates[`chats/tv${currentTV}/${child.key}/readByCustomer`] = true
      }
    })
    if(Object.keys(updates).length) db.ref().update(updates)
  })
}

function renderChat(all){
  const msgs = Object.values(all).sort((a,b) => (a.ts||0) - (b.ts||0))
  const el   = document.getElementById('chatMessages')
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60

  if(!msgs.length){
    el.innerHTML = `<div class="chat-empty"><div style="font-size:36px;">💬</div><div style="font-size:12px;line-height:1.6;">Belum ada pesan.<br>Ketik di bawah untuk chat ke operator.</div></div>`
    return
  }
  el.innerHTML = msgs.map(m => {
    const isMe = m.dari === 'customer' && m.nama === currentNama && m.tv == currentTV
    const waktu = m.ts ? new Date(m.ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) : ''
    if(isMe){
      const tick = m.read
        ? `<span style="color:#00f5ff;font-size:12px;">✓✓</span>`
        : `<span style="color:rgba(168,200,240,0.4);font-size:12px;">✓</span>`
      return `<div class="chat-bubble bubble-me">${escH(m.pesan)}<div class="bubble-time">${waktu} ${tick}</div></div>`
    } else {
      return `<div class="chat-bubble bubble-op"><div class="bubble-sender">🎮 ${escH(m.nama||'OPERATOR')}</div>${escH(m.pesan)}<div class="bubble-time">${waktu}</div></div>`
    }
  }).join('')

  if(atBottom) el.scrollTop = el.scrollHeight

  // Badge chat jika ada balasan operator & bukan di tab chat
  if(!document.getElementById('tbChat').classList.contains('active')){
    const opMsgs = msgs.filter(m => m.dari === 'operator')
    if(opMsgs.length){
      const b = document.getElementById('bdChat')
      b.style.display = 'flex'
      b.textContent   = opMsgs.length > 9 ? '9+' : opMsgs.length
    }
  }
}

async function sendChat(){
  const inp   = document.getElementById('chatInput')
  const pesan = inp.value.trim()
  if(!pesan || !db) return
  inp.value = ''; autoResize(inp)
  try{
    await db.ref(`chats/tv${currentTV}`).push({ dari:'customer', nama:currentNama, tv:currentTV, pesan, ts:Date.now(), read:false })
    await db.ref(`notifications/chats/tv${currentTV}`).set({ tv:currentTV, nama:currentNama, pesan:pesan.slice(0,60), ts:Date.now(), read:false })
    document.getElementById('chatMessages').scrollTop = 99999
  }catch(e){ showToast('❌ Gagal kirim pesan.') }
}

function chatEnter(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendChat() }
}
function quickSend(pesan){
  document.getElementById('chatInput').value = pesan
  autoResize(document.getElementById('chatInput'))
  sendChat()
}
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px' }

// ══════════════════════════════════════
// TAB & MODAL
// ══════════════════════════════════════
function switchTab(tab){
  const tabs = { menu:'Menu', pesanan:'Pesanan', chat:'Chat' }
  Object.keys(tabs).forEach(t => {
    document.getElementById('tb'+tabs[t])?.classList.remove('active')
    document.getElementById('tab'+tabs[t])?.classList.remove('active')
  })
  document.getElementById('tb'+tabs[tab])?.classList.add('active')
  document.getElementById('tab'+tabs[tab])?.classList.add('active')
  if(tab==='chat'){ const b=document.getElementById('bdChat'); b.style.display='none'; b.textContent=''; setTimeout(()=>{ document.getElementById('chatMessages').scrollTop=99999 },100) }
  if(tab==='pesanan'){ const b=document.getElementById('bdPesanan'); b.style.display='none'; b.textContent='' }
}

function openModal(id)  { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open') })
})

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function rp(n){ return 'Rp ' + Number(n).toLocaleString('id-ID') }
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function showToast(msg, dur=2500){ const t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0', dur) }
function showError(msg){
  document.getElementById('loadScreen').innerHTML = `<div style="text-align:center;padding:24px;max-width:340px;">
    <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
    <div style="font-family:'Orbitron',monospace;font-size:12px;color:var(--red);letter-spacing:1px;margin-bottom:10px;">TIDAK DAPAT TERHUBUNG</div>
    <div style="font-size:12px;color:var(--t40);line-height:1.7;white-space:pre-line;">${msg}</div>
  </div>`
  document.getElementById('loadScreen').style.display = 'flex'
}
</script>
